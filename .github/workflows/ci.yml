name: CI / CD

on:
    push:
        branches:
            - main
            - staging
            - develop
    pull_request:
        branches:
            - main
            - develop
    workflow_dispatch: {}

jobs:
    validate:
        name: Validate, lint, test, build
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: "20"
                  cache: "npm"
            - name: Install dependencies
              run: |
                  cd backend
                  npm ci
            - name: Lint source
              run: |
                  cd backend
                  npm run lint
            - name: Run tests
              run: |
                  cd backend
                  npm test
            - name: Build production bundle
              run: |
                  cd backend
                  npm run build

    docker-build:
        name: Build container image
        needs: validate
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
        steps:
            - uses: actions/checkout@v4
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Build Docker image
              run: |
                  docker build -t expense-tracker-backend:${{ github.sha }} backend
            - name: Login to container registry
              if: ${{ secrets.REGISTRY_URL && secrets.REGISTRY_USERNAME &&
                  secrets.REGISTRY_PASSWORD }}
              uses: docker/login-action@v5
              with:
                  registry: ${{ secrets.REGISTRY_URL }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}
            - name: Push Docker image
              if: ${{ secrets.REGISTRY_URL && secrets.REGISTRY_USERNAME &&
                  secrets.REGISTRY_PASSWORD }}
              run: |
                  docker tag expense-tracker-backend:${{ github.sha }} ${{ secrets.REGISTRY_URL }}/expense-tracker-backend:${{ github.sha }}
                  docker push ${{ secrets.REGISTRY_URL }}/expense-tracker-backend:${{ github.sha }}

    deploy-staging:
        name: Deploy to staging
        needs: docker-build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' && secrets.STAGING_SSH_PRIVATE_KEY
        steps:
            - uses: actions/checkout@v4
            - name: Start SSH agent
              uses: webfactory/ssh-agent@v0.8.0
              with:
                  ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
            - name: Deploy application
              run: |
                  ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} <<'EOF'
                  docker pull ${{ secrets.REGISTRY_URL }}/expense-tracker-backend:${{ github.sha }}
                  docker stop expense-tracker-backend || true
                  docker rm expense-tracker-backend || true
                  docker run -d --name expense-tracker-backend -p 5000:5000 \
                    --env NODE_ENV=production \
                    --env DATABASE_URL='${{ secrets.STAGING_DATABASE_URL }}' \
                    ${{ secrets.REGISTRY_URL }}/expense-tracker-backend:${{ github.sha }}
                  EOF
